name: CI Build

on:
  push:
    branches: [ devops ]
    paths:
      - 'eOpcina/**' 
  pull_request:
    branches: [ devops ]
    paths:
      - 'eOpcina/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' 

    - name: Restore dependencies
      run: dotnet restore eOpcina/eOpcina.sln

    - name: Build
      run: dotnet build eOpcina/eOpcina.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test eOpcina/eOpcina.sln --no-build --verbosity normal